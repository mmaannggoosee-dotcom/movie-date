<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css" />
    <title>Invitation Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    
</head>
<body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
        <img src="envelope.jpg" alt="Envelope" id="envelope" />
        <p>Letter for You!</p>
    </div>

    <!-- Letter Screen -->
     <div id="letter-container">
        <div class="letter-window">
            <h1>Will you watch movies with me?</h1>

            <img src="cat_heart.gif" class="cat" id="letter-cat" alt="Cat" />

            <div class="buttons" id="letter-button">
                <img src="yes.png" class="btn yes-btn" alt="Yes" />

                <div class="no-wrapper">
                    <img src="no.png" class="btn no-btn" alt="No" />
                </div>
            </div>

            <p id="final-text" class="final-text" style="display: none">
                <strong>Movie Date :</strong>My place at 12:00am. Just You and Me. </p>
            </div>
        </div>
    

      <script src="script.js"></script>
</body>
</html>
